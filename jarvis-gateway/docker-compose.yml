version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis_password
      POSTGRES_DB: jarvis_os
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  qdrant:
    image: qdrant/qdrant:v1.8.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.18.0
    environment:
      NEO4J_AUTH: neo4j/jarvis_graph_pass
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data

volumes:
  pgdata:
  qdrant_data:
  neo4j_data: